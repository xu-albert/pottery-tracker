name: pottery_tracker
description: "A photo-first pottery tracking app for hobby potters."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Database
  drift: ^2.22.1
  sqlcipher_flutter_libs: ^0.5.1

  # Routing
  go_router: ^15.1.2

  # Image handling
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0
  exif: ^3.3.0

  # Utilities
  uuid: ^4.5.1
  path_provider: ^2.1.5
  path_provider_foundation: 2.5.1
  path: ^1.9.1
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  sqlite3: ^2.9.4
  intl: ^0.20.2

  # Auth
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.7
  google_fonts: ^8.0.1
  url_launcher: ^6.3.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  firebase_analytics: ^11.4.2
  firebase_crashlytics: ^4.3.2
  firebase_performance: ^0.10.1+2
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_app_check: ^0.3.2+10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.4
  sqlite3: ^2.9.4
  fake_async: ^1.3.2
  fake_cloud_firestore: ^3.1.0
  firebase_storage_mocks: ^0.7.0

flutter:
  uses-material-design: true
  generate: true

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/icon/icon.png"
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
